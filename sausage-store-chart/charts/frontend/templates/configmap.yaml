---
apiVersion: v1
kind: ConfigMap
metadata:
  name: { { printf "%s-%s-conf" .Release.Name .Chart.Name | quote } }
  labels:
    app.kubernetes.io/name: { { .Chart.Name | quote } }
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/version: { { .Chart.AppVersion | quote } }
    app.kubernetes.io/managed-by: { { .Release.Service | quote } }
    helm.sh/chart: { { printf "%s-%s" .Chart.Name .Chart.Version | quote } }
    app.kubernetes.io/component: { { .Chart.Name | quote } }
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
data:
  { { .Values.nginxConf | quote } }: |
    user  nginx;
    worker_processes  auto;
    error_log  /var/log/nginx/error.log notice;
    pid        /var/run/nginx.pid;

    events {
    worker_connections  1024;
  }

    http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    
    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
    '$status $body_bytes_sent "$http_referer" '
    '"$http_user_agent" "$http_x_forwarded_for"';
    
    access_log  /var/log/nginx/access.log  main;
    
    sendfile        on;
    keepalive_timeout  65;
    
    server {
    listen       {{ .Values.containerPort }};
    
    location / {
    root   /usr/share/nginx/html;
    index  index.html;
    try_files $uri $uri/ /index.html;
  }

    location /api {
    proxy_pass http://{{ .Release.Name }}-backend-service:{{ .Values.backendService.port }};
  }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
    root   /usr/share/nginx/html;
  }
  }
  }
