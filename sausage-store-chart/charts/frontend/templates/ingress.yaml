---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: { { printf "%s-%s-ingress" .Release.Name .Chart.Name | quote } }
  labels:
    app.kubernetes.io/name: { { .Chart.Name | quote } }
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/version: { { .Chart.AppVersion | quote } }
    app.kubernetes.io/managed-by: { { .Release.Service | quote } }
    helm.sh/chart: { { printf "%s-%s" .Chart.Name .Chart.Version | quote } }
    app.kubernetes.io/component: { { .Chart.Name | quote } }
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
spec:
  ingressClassName: "nginx"
  tls:
    - hosts:
        - { { .Values.ingress.host | quote } }
      secretName: { { .Values.ingress.tlsSecretName | quote } }
  rules:
    - host: { { .Values.ingress.host | quote } }
      http:
        paths:
          - path: { { .Values.ingress.path | quote } }
            pathType: { { .Values.ingress.pathType | quote } }
            backend:
              service:
                name: { { printf "%s-%s-service" .Release.Name .Chart.Name | quote } }
                port:
                  number: { { .Values.service.port } }
