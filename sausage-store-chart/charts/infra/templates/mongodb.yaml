---
apiVersion: v1
kind: Secret
metadata:
  name: "mongodb-secret"
  labels:
    app.kubernetes.io/name: "mongodb"
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/managed-by: { { .Release.Service | quote } }
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: { { .Values.mongodb.rootUsername | quote } }
  MONGO_INITDB_ROOT_PASSWORD: { { .Values.mongodb.rootPassword | quote } }
  MONGO_INITDB_DATABASE: { { .Values.mongodb.database | quote } }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "mongodb"
  labels:
    app.kubernetes.io/name: "mongodb"
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/version: { { .Chart.AppVersion | quote } }
    app.kubernetes.io/managed-by: { { .Release.Service | quote } }
    helm.sh/chart: { { printf "%s-%s" .Chart.Name .Chart.Version | quote } }
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
spec:
  serviceName: "mongodb"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "mongodb"
      app.kubernetes.io/instance: { { .Release.Name | quote } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "mongodb"
        app.kubernetes.io/instance: { { .Release.Name | quote } }
        app.kubernetes.io/component: "database"
        app.kubernetes.io/part-of: "sausage-store"
        env: { { .Values.global.environment | quote } }
    spec:
      containers:
        - name: "mongodb"
          image: { { .Values.mongodb.image | quote } }
          imagePullPolicy: { { .Values.global.imagePullPolicy | quote } }
          envFrom:
            - secretRef:
                name: "mongodb-secret"
          ports:
            - name: mongodb
              containerPort: { { .Values.mongodb.containerPort } }
          resources:
  { { - toYaml .Values.mongodb.resources | nindent 12 } }
volumeMounts:
  - name: "mongodb-data"
    mountPath: "/data/db"
volumeClaimTemplates:
  - metadata:
      name: "mongodb-data"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: { { .Values.mongodb.storage | quote } }
---
apiVersion: v1
kind: Service
metadata:
  name: "mongodb"
  labels:
    app.kubernetes.io/name: "mongodb"
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
spec:
  clusterIP: None
  ports:
    - name: mongodb
      port: { { .Values.mongodb.service.port } }
      targetPort: { { .Values.mongodb.containerPort } }
  selector:
    app.kubernetes.io/name: "mongodb"
    app.kubernetes.io/instance: { { .Release.Name | quote } }
