---
apiVersion: v1
kind: Secret
metadata:
  name: "mongodb-secret"
  labels:
    app.kubernetes.io/name: "mongodb"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: "{{ .Values.global.environment }}"
type: Opaque
stringData:
  MONGO_INITDB_ROOT_USERNAME: "{{ .Values.mongodb.rootUsername }}"
  MONGO_INITDB_ROOT_PASSWORD: "{{ .Values.mongodb.rootPassword }}"
  MONGO_INITDB_DATABASE: "{{ .Values.mongodb.database }}"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "mongodb"
  labels:
    app.kubernetes.io/name: "mongodb"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: "{{ .Values.global.environment }}"
spec:
  serviceName: "mongodb"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "mongodb"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "mongodb"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
        app.kubernetes.io/component: "database"
        app.kubernetes.io/part-of: "sausage-store"
        env: "{{ .Values.global.environment }}"
    spec:
      containers:
        - name: "mongodb"
          image: "{{ .Values.mongodb.image }}"
          imagePullPolicy: "{{ .Values.global.imagePullPolicy }}"
          envFrom:
            - secretRef:
                name: "mongodb-secret"
          ports:
            - name: mongodb
              containerPort: {{ .Values.mongodb.containerPort }}
          resources:
{{- toYaml .Values.mongodb.resources | nindent 12 }}
          volumeMounts:
            - name: "mongodb-data"
              mountPath: "/data/db"
  volumeClaimTemplates:
    - metadata:
        name: "mongodb-data"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: "{{ .Values.mongodb.storage }}"
---
apiVersion: v1
kind: Service
metadata:
  name: "mongodb"
  labels:
    app.kubernetes.io/name: "mongodb"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: "{{ .Values.global.environment }}"
spec:
  clusterIP: None
  ports:
    - name: mongodb
      port: {{ .Values.mongodb.service.port }}
      targetPort: {{ .Values.mongodb.containerPort }}
  selector:
    app.kubernetes.io/name: "mongodb"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
