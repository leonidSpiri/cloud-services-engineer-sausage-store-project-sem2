---
apiVersion: v1
kind: Secret
metadata:
  name: "postgresql-secret"
  labels:
    app.kubernetes.io/name: "postgresql"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: "{{ .Values.global.environment }}"
type: Opaque
stringData:
  POSTGRES_DB: "{{ .Values.postgresql.database }}"
  POSTGRES_USER: "{{ .Values.postgresql.username }}"
  POSTGRES_PASSWORD: "{{ .Values.postgresql.password }}"
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "postgresql"
  labels:
    app.kubernetes.io/name: "postgresql"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: "{{ .Values.global.environment }}"
spec:
  serviceName: "postgresql"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "postgresql"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "postgresql"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
        app.kubernetes.io/component: "database"
        app.kubernetes.io/part-of: "sausage-store"
        env: "{{ .Values.global.environment }}"
    spec:
      containers:
        - name: "postgresql"
          image: "{{ .Values.postgresql.image }}"
          imagePullPolicy: "{{ .Values.global.imagePullPolicy }}"
          ports:
            - name: postgresql
              containerPort: {{ .Values.postgresql.containerPort }}
          envFrom:
            - secretRef:
                name: "postgresql-secret"
          env:
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
{{- toYaml .Values.postgresql.resources | nindent 12 }}
          volumeMounts:
            - name: "postgresql-data"
              mountPath: "/var/lib/postgresql/data"
  volumeClaimTemplates:
    - metadata:
        name: "postgresql-data"
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: "{{ .Values.postgresql.storage }}"
---
apiVersion: v1
kind: Service
metadata:
  name: "postgresql"
  labels:
    app.kubernetes.io/name: "postgresql"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: "{{ .Values.global.environment }}"
spec:
  clusterIP: None
  ports:
    - name: postgresql
      port: {{ .Values.postgresql.service.port }}
      targetPort: {{ .Values.postgresql.containerPort }}
  selector:
    app.kubernetes.io/name: "postgresql"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
