---
apiVersion: v1
kind: Secret
metadata:
  name: "postgresql-secret"
  labels:
    app.kubernetes.io/name: "postgresql"
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/managed-by: { { .Release.Service | quote } }
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
type: Opaque
stringData:
  POSTGRES_DB: { { .Values.postgresql.database | quote } }
  POSTGRES_USER: { { .Values.postgresql.username | quote } }
  POSTGRES_PASSWORD: { { .Values.postgresql.password | quote } }
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: "postgresql"
  labels:
    app.kubernetes.io/name: "postgresql"
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/version: { { .Chart.AppVersion | quote } }
    app.kubernetes.io/managed-by: { { .Release.Service | quote } }
    helm.sh/chart: { { printf "%s-%s" .Chart.Name .Chart.Version | quote } }
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
spec:
  serviceName: "postgresql"
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: "postgresql"
      app.kubernetes.io/instance: { { .Release.Name | quote } }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "postgresql"
        app.kubernetes.io/instance: { { .Release.Name | quote } }
        app.kubernetes.io/component: "database"
        app.kubernetes.io/part-of: "sausage-store"
        env: { { .Values.global.environment | quote } }
    spec:
      containers:
        - name: "postgresql"
          image: { { .Values.postgresql.image | quote } }
          imagePullPolicy: { { .Values.global.imagePullPolicy | quote } }
          ports:
            - name: postgresql
              containerPort: { { .Values.postgresql.containerPort } }
          envFrom:
            - secretRef:
                name: "postgresql-secret"
          env:
            - name: PGDATA
              value: "/var/lib/postgresql/data/pgdata"
          resources:
  { { - toYaml .Values.postgresql.resources | nindent 12 } }
volumeMounts:
  - name: "postgresql-data"
    mountPath: "/var/lib/postgresql/data"
volumeClaimTemplates:
  - metadata:
      name: "postgresql-data"
    spec:
      accessModes:
        - ReadWriteOnce
      resources:
        requests:
          storage: { { .Values.postgresql.storage | quote } }
---
apiVersion: v1
kind: Service
metadata:
  name: "postgresql"
  labels:
    app.kubernetes.io/name: "postgresql"
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
spec:
  clusterIP: None
  ports:
    - name: postgresql
      port: { { .Values.postgresql.service.port } }
      targetPort: { { .Values.postgresql.containerPort } }
  selector:
    app.kubernetes.io/name: "postgresql"
    app.kubernetes.io/instance: { { .Release.Name | quote } }
