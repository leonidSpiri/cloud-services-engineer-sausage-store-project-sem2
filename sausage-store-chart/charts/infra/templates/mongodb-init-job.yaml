---
apiVersion: v1
kind: Secret
metadata:
  name: "mongodb-reports-secret"
  labels:
    app.kubernetes.io/name: "mongodb-reports"
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/managed-by: { { .Release.Service | quote } }
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
type: Opaque
stringData:
  MONGO_DATABASE: { { .Values.mongodb.database | quote } }
  MONGO_REPORTS_USERNAME: { { .Values.mongodb.reportsUsername | quote } }
  MONGO_REPORTS_PASSWORD: { { .Values.mongodb.reportsPassword | quote } }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: { { printf "%s-mongodb-init" .Release.Name | quote } }
  labels:
    app.kubernetes.io/name: "mongodb-init"
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/version: { { .Chart.AppVersion | quote } }
    app.kubernetes.io/managed-by: { { .Release.Service | quote } }
    helm.sh/chart: { { printf "%s-%s" .Chart.Name .Chart.Version | quote } }
    app.kubernetes.io/component: "database-init"
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
  annotations:
    helm.sh/hook: "post-install,post-upgrade"
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: "before-hook-creation"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "mongodb-init"
        app.kubernetes.io/instance: { { .Release.Name | quote } }
        app.kubernetes.io/component: "database-init"
        app.kubernetes.io/part-of: "sausage-store"
        env: { { .Values.global.environment | quote } }
    spec:
      restartPolicy: OnFailure
      containers:
        - name: "mongodb-init"
          image: { { .Values.mongodb.image | quote } }
          imagePullPolicy: { { .Values.global.imagePullPolicy | quote } }
          envFrom:
            - secretRef:
                name: "mongodb-secret"
            - secretRef:
                name: "mongodb-reports-secret"
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu

              until mongosh "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:{{ .Values.mongodb.service.port }}/admin" --quiet --eval 'db.runCommand({ ping: 1 }).ok' >/dev/null; do
                echo "Waiting for MongoDB..."
                sleep 5
              done

              mongosh "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:{{ .Values.mongodb.service.port }}/admin" --quiet --eval '
                const dbName = process.env.MONGO_DATABASE;
                const username = process.env.MONGO_REPORTS_USERNAME;
                const password = process.env.MONGO_REPORTS_PASSWORD;
                const reportsDb = db.getSiblingDB(dbName);
                const roles = [{ role: "readWrite", db: dbName }];

                if (reportsDb.getUser(username)) {
                  reportsDb.updateUser(username, { pwd: password, roles });
                } else {
                  reportsDb.createUser({ user: username, pwd: password, roles });
                }
              '
          resources:
  { { - toYaml .Values.mongodb.resources | nindent 12 } }
