---
apiVersion: v1
kind: Secret
metadata:
  name: "mongodb-reports-secret"
  labels:
    app.kubernetes.io/name: "mongodb-reports"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    app.kubernetes.io/component: "database"
    app.kubernetes.io/part-of: "sausage-store"
    env: "{{ .Values.global.environment }}"
type: Opaque
stringData:
  MONGO_DATABASE: "{{ .Values.mongodb.database }}"
  MONGO_REPORTS_USERNAME: "{{ .Values.mongodb.reportsUsername }}"
  MONGO_REPORTS_PASSWORD: "{{ .Values.mongodb.reportsPassword }}"
---
apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ .Release.Name }}-mongodb-init"
  labels:
    app.kubernetes.io/name: "mongodb-init"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/component: "database-init"
    app.kubernetes.io/part-of: "sausage-store"
    env: "{{ .Values.global.environment }}"
  annotations:
    helm.sh/hook: "post-install,post-upgrade"
    helm.sh/hook-weight: "5"
    helm.sh/hook-delete-policy: "before-hook-creation"
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "mongodb-init"
        app.kubernetes.io/instance: "{{ .Release.Name }}"
        app.kubernetes.io/component: "database-init"
        app.kubernetes.io/part-of: "sausage-store"
        env: "{{ .Values.global.environment }}"
    spec:
      restartPolicy: OnFailure
      containers:
        - name: "mongodb-init"
          image: "{{ .Values.mongodb.image }}"
          imagePullPolicy: "{{ .Values.global.imagePullPolicy }}"
          envFrom:
            - secretRef:
                name: "mongodb-secret"
            - secretRef:
                name: "mongodb-reports-secret"
          command:
            - /bin/sh
            - -c
          args:
            - |
              set -eu

              until mongosh "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:{{ .Values.mongodb.service.port }}/admin" --quiet --eval 'db.runCommand({ ping: 1 }).ok' >/dev/null; do
                echo "Waiting for MongoDB..."
                sleep 5
              done

              mongosh "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb:{{ .Values.mongodb.service.port }}/admin" --quiet --eval '
                const dbName = process.env.MONGO_DATABASE;
                const username = process.env.MONGO_REPORTS_USERNAME;
                const password = process.env.MONGO_REPORTS_PASSWORD;
                const reportsDb = db.getSiblingDB(dbName);
                const roles = [{ role: "readWrite", db: dbName }];

                if (reportsDb.getUser(username)) {
                  reportsDb.updateUser(username, { pwd: password, roles });
                } else {
                  reportsDb.createUser({ user: username, pwd: password, roles });
                }
              '
          resources:
{{- toYaml .Values.mongodb.resources | nindent 12 }}
