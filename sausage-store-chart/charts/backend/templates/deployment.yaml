---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{{ .Release.Name }}-{{ .Chart.Name }}"
  namespace: "{{ .Release.Namespace }}"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/component: "{{ .Chart.Name }}"
    app.kubernetes.io/part-of: "sausage-store"
    env: "{{ .Values.global.environment }}"
spec:
  revisionHistoryLimit: { { .Values.revisionHistoryLimit } }
  replicas: { { .Values.replicas } }
  strategy: {{- toYaml .Values.strategy | nindent 4 }}
selector:
  matchLabels:
    app: "{{ .Release.Name }}-{{ .Chart.Name }}"
template:
  metadata:
    annotations:
      prometheus.io/path: "{{ .Values.annotations.path }}"
      prometheus.io/port: "{{ .Values.annotations.port }}"
      prometheus.io/scrape: "{{ .Values.annotations.scrape }}"
    labels:
      app: "{{ .Release.Name }}-{{ .Chart.Name }}"
      app.kubernetes.io/name: "{{ .Chart.Name }}"
      app.kubernetes.io/instance: "{{ .Release.Name }}"
      app.kubernetes.io/component: "{{ .Chart.Name }}"
      app.kubernetes.io/part-of: "sausage-store"
      env: "{{ .Values.global.environment }}"
  spec:
    containers:
      - name: "{{ .Chart.Name }}"
        image: "{{ .Values.image }}"
        imagePullPolicy: "{{ .Values.imagePullPolicy }}"
        env:
          - name: SPRING_CLOUD_VAULT_ENABLED
            value: "{{ .Values.env.vaultEnabled }}"
          - name: MANAGEMENT_HEALTH_VAULT_ENABLED
            value: "{{ .Values.env.vaultHealthEnabled }}"
          - name: SPRING_DATASOURCE_URL
            valueFrom:
              configMapKeyRef:
                name: "{{ .Release.Name }}-{{ .Chart.Name }}-conf"
                key: postgres_uri
          - name: SPRING_DATASOURCE_USERNAME
            valueFrom:
              configMapKeyRef:
                name: "{{ .Release.Name }}-{{ .Chart.Name }}-conf"
                key: postgres_user
          - name: SPRING_DATASOURCE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: "{{ .Release.Name }}-{{ .Chart.Name }}-secret"
                key: postgres_password
          - name: SPRING_DATA_MONGODB_URI
            valueFrom:
              secretKeyRef:
                name: "{{ .Release.Name }}-{{ .Chart.Name }}-secret"
                key: mongo_uri
          - name: REPORT_PATH
            valueFrom:
              configMapKeyRef:
                name: "{{ .Release.Name }}-{{ .Chart.Name }}-conf"
                key: report_path
          - name: LOG_PATH
            valueFrom:
              configMapKeyRef:
                name: "{{ .Release.Name }}-{{ .Chart.Name }}-conf"
                key: log_path
        resources:
  { { - toYaml .Values.resources | nindent 12 } }
ports:
  - name: http
    containerPort: { { .Values.containerPort } }
livenessProbe:
  { { - toYaml .Values.livenessProbe | nindent 12 } }
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: "{{ .Release.Name }}-{{ .Chart.Name }}-vpa"
  labels:
    app.kubernetes.io/name: "{{ .Chart.Name }}"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    app.kubernetes.io/version: "{{ .Chart.AppVersion }}"
    app.kubernetes.io/managed-by: "{{ .Release.Service }}"
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
    app.kubernetes.io/component: "{{ .Chart.Name }}"
    app.kubernetes.io/part-of: "sausage-store"
    env: "{{ .Values.global.environment }}"
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: "{{ .Release.Name }}-{{ .Chart.Name }}"
  updatePolicy:
  { { - toYaml .Values.vpa.updatePolicy | nindent 4 } }
resourcePolicy:
  { { - toYaml .Values.vpa.resourcePolicy | nindent 4 } }
