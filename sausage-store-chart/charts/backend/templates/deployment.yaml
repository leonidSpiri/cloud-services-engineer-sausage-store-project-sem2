---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: { { printf "%s-%s" .Release.Name .Chart.Name | quote } }
  namespace: { { .Release.Namespace | quote } }
  labels:
    app.kubernetes.io/name: { { .Chart.Name | quote } }
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/version: { { .Chart.AppVersion | quote } }
    app.kubernetes.io/managed-by: { { .Release.Service | quote } }
    helm.sh/chart: { { printf "%s-%s" .Chart.Name .Chart.Version | quote } }
    app.kubernetes.io/component: { { .Chart.Name | quote } }
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
spec:
  revisionHistoryLimit: { { .Values.revisionHistoryLimit } }
  replicas: { { .Values.replicas } }
  strategy:
  { { - toYaml .Values.strategy | nindent 4 } }
selector:
  matchLabels:
    app: { { printf "%s-%s" .Release.Name .Chart.Name | quote } }
template:
  metadata:
    annotations:
      prometheus.io/path: { { .Values.annotations.path | quote } }
      prometheus.io/port: { { .Values.annotations.port | quote } }
      prometheus.io/scrape: { { .Values.annotations.scrape | quote } }
    labels:
      app: { { printf "%s-%s" .Release.Name .Chart.Name | quote } }
      app.kubernetes.io/name: { { .Chart.Name | quote } }
      app.kubernetes.io/instance: { { .Release.Name | quote } }
      app.kubernetes.io/component: { { .Chart.Name | quote } }
      app.kubernetes.io/part-of: "sausage-store"
      env: { { .Values.global.environment | quote } }
  spec:
    containers:
      - name: { { .Chart.Name | quote } }
        image: { { .Values.image | quote } }
        imagePullPolicy: { { .Values.imagePullPolicy | quote } }
        env:
          - name: SPRING_DATASOURCE_URL
            valueFrom:
              configMapKeyRef:
                name: { { printf "%s-%s-conf" .Release.Name .Chart.Name | quote } }
                key: postgres_uri
          - name: SPRING_DATASOURCE_USERNAME
            valueFrom:
              configMapKeyRef:
                name: { { printf "%s-%s-conf" .Release.Name .Chart.Name | quote } }
                key: postgres_user
          - name: SPRING_DATASOURCE_PASSWORD
            valueFrom:
              secretKeyRef:
                name: { { printf "%s-%s-secret" .Release.Name .Chart.Name | quote } }
                key: postgres_password
          - name: SPRING_DATA_MONGODB_URI
            valueFrom:
              secretKeyRef:
                name: { { printf "%s-%s-secret" .Release.Name .Chart.Name | quote } }
                key: mongo_uri
          - name: REPORT_PATH
            valueFrom:
              configMapKeyRef:
                name: { { printf "%s-%s-conf" .Release.Name .Chart.Name | quote } }
                key: report_path
          - name: LOG_PATH
            valueFrom:
              configMapKeyRef:
                name: { { printf "%s-%s-conf" .Release.Name .Chart.Name | quote } }
                key: log_path
        resources:
  { { - toYaml .Values.resources | nindent 12 } }
ports:
  - name: http
    containerPort: { { .Values.containerPort } }
livenessProbe:
  { { - toYaml .Values.livenessProbe | nindent 12 } }
---
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: { { printf "%s-%s-vpa" .Release.Name .Chart.Name | quote } }
  labels:
    app.kubernetes.io/name: { { .Chart.Name | quote } }
    app.kubernetes.io/instance: { { .Release.Name | quote } }
    app.kubernetes.io/version: { { .Chart.AppVersion | quote } }
    app.kubernetes.io/managed-by: { { .Release.Service | quote } }
    helm.sh/chart: { { printf "%s-%s" .Chart.Name .Chart.Version | quote } }
    app.kubernetes.io/component: { { .Chart.Name | quote } }
    app.kubernetes.io/part-of: "sausage-store"
    env: { { .Values.global.environment | quote } }
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: { { printf "%s-%s" .Release.Name .Chart.Name | quote } }
  updatePolicy:
  { { - toYaml .Values.vpa.updatePolicy | nindent 4 } }
resourcePolicy:
  { { - toYaml .Values.vpa.resourcePolicy | nindent 4 } }
